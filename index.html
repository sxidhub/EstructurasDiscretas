<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Estructuras Discretas</title>
    <style>
        /* CSS: Diseño y Colores (Azul y Oro UNAM) */
        :root {
            --azul-unam: #002B5C;
            --oro-unam: #D4AF37;
            --fondo: #f4f7f6;
            --texto: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--fondo);
            color: var(--texto);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--azul-unam);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 5px solid var(--oro-unam);
        }

        .search-container {
            margin-top: 15px;
        }

        #searchBar {
            padding: 10px 15px;
            width: 80%;
            max-width: 400px;
            border: 2px solid var(--oro-unam);
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }

        .info-nota {
            background-color: #e9ecef;
            padding: 10px;
            text-align: center;
            font-size: 0.9em;
            color: #555;
        }

        /* Grid para las tarjetas de los libros */
        .grid-libros {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .tarjeta-libro {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }

        .tarjeta-libro:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .portada {
            width: 100%;
            height: 200px;
            background-color: #ddd; /* Color temporal si no hay foto */
            object-fit: contain;
            border-bottom: 2px solid var(--oro-unam);
        }

        .contenido-tarjeta {
            padding: 15px;
            flex-grow: 1;
        }

        .titulo-libro {
            color: var(--azul-unam);
            margin: 0 0 10px 0;
            font-size: 1.2em;
        }

        .autor {
            font-style: italic;
            color: #666;
            margin-bottom: 10px;
        }

        .etiqueta-temas {
            display: inline-block;
            background-color: var(--oro-unam);
            color: var(--azul-unam);
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 0.85em;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .ubicaciones {
            font-size: 0.9em;
        }

        .ubicaciones a {
            color: var(--azul-unam);
            text-decoration: none;
            font-weight: bold;
        }

        .ubicaciones a:hover {
            text-decoration: underline;
        }

        .tag-biblioteca {
            display: inline-block;
            border: 1px solid var(--azul-unam);
            padding: 2px 6px;
            border-radius: 4px;
            margin: 2px 0;
            font-size: 0.85em;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bibliografía: Estructuras Discretas</h1>
        <p>Fuente de consulta digital - Semestre 2026-2</p>
        <div class="search-container">
            <input type="text" id="searchBar" placeholder="Buscar por título, autor o tema...">
        </div>
    </header>

    <div class="info-nota">
        <strong>Nota de Ubicaciones:</strong> 
        Principal = Biblioteca "Mtro. Enrique Rivero Borrell" | 
        Anexo = Biblioteca "Ing. Antonio Dovalí Jaime".
    </div>

<main class="grid-libros" id="contenedorLibros">
    </main>

    <script>
        // 1. EL "DICCIONARIO" DE MAPAS
        // Aquí guardas los links una sola vez. Si un link cambia, lo cambias aquí y se actualiza en todos los libros.
        const linksBibliotecas = {
            "Principal": "https://maps.app.goo.gl/TU_LINK_AL_PRINCIPAL", // Cambia esto por el link real de Google Maps
            "Anexo": "https://maps.app.goo.gl/TU_LINK_AL_ANEXO"         // Cambia esto por el link real de Google Maps
        };

        // 2. TU BASE DE DATOS DE LIBROS (El arreglo)
        // Aquí solo pones la información pura. Fíjate cómo "ubicaciones" es solo una lista de palabras.
        const baseDeDatosLibros = [
            {
                titulo: "Discrete Mathematical Structures",
                autor: "KOLMAN, Bernard",
                temas: "Todos",
                imagen: "https://via.placeholder.com/300x200?text=Kolman",
                ubicaciones: ["Principal", "Anexo"],
                extra: "Biblioteca Central, Fac. Química"
            },
            {
                titulo: "Algorithms: Sequential, Parallel...",
                autor: "BERMAN, Kenneth A.",
                temas: "4, 5",
                imagen: "https://via.placeholder.com/300x200?text=Berman",
                ubicaciones: ["Principal", "Anexo"],
                extra: "" // Si no hay extra, lo dejas vacío
            },
            {
                titulo: "Discrete mathematics: elementary and beyond",
                autor: "LOVASZ, Laszlo",
                temas: "1, 2, 3, 4",
                imagen: "https://via.placeholder.com/300x200?text=Lovasz",
                ubicaciones: ["Anexo"], // Este solo está en el Anexo
                extra: "Recurso en línea en elibrounam, Inst. Matemáticas, C. Física Aplic."
            }
            // Puedes agregar todos los demás libros separándolos con comas...
        ];

        // 3. LA LÓGICA QUE CONSTRUYE EL HTML AUTOMÁTICAMENTE
        const contenedor = document.getElementById('contenedorLibros');

        function renderizarLibros() {
            contenedor.innerHTML = ""; // Limpiamos el contenedor
            
            baseDeDatosLibros.forEach(libro => {
                // Generamos las etiquetas de ubicación leyendo el diccionario
                let htmlUbicaciones = libro.ubicaciones.map(ubi => {
                    let link = linksBibliotecas[ubi] || "#"; // Busca el link, si no existe pone "#"
                    return `<span class="tag-biblioteca"><a href="${link}" target="_blank">[${ubi}]</a></span>`;
                }).join(" ");

                // Agregamos el texto extra solo si existe
                let htmlExtra = libro.extra !== "" ? `<br><small><i>Extra: ${libro.extra}</i></small>` : "";

                // Plantilla HTML del libro
                let tarjetaHTML = `
                    <article class="tarjeta-libro">
                        <img src="${libro.imagen}" alt="Portada" class="portada">
                        <div class="contenido-tarjeta">
                            <h2 class="titulo-libro">${libro.titulo}</h2>
                            <p class="autor">${libro.autor}</p>
                            <div class="etiqueta-temas">Temas: ${libro.temas}</div>
                            
                            <div class="ubicaciones">
                                <p><strong>Ubicación Física:</strong></p>
                                ${htmlUbicaciones}
                                ${htmlExtra}
                            </div>
                        </div>
                    </article>
                `;
                
                // Inyectamos la tarjeta en la página
                contenedor.innerHTML += tarjetaHTML;
            });
        }

        // Ejecutamos la función al cargar la página
        renderizarLibros();

        // 4. LÓGICA DE LA BARRA DE BÚSQUEDA
        document.getElementById('searchBar').addEventListener('keyup', function(e) {
            const termino = e.target.value.toLowerCase();
            const tarjetas = document.getElementsByClassName('tarjeta-libro');

            Array.from(tarjetas).forEach(tarjeta => {
                const textoTarjeta = tarjeta.innerText.toLowerCase();
                tarjeta.style.display = textoTarjeta.includes(termino) ? 'flex' : 'none';
            });
        });
    </script>
</body>
</html>
