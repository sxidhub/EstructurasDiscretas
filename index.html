<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Estructuras Discretas</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* CSS: Diseño y Colores (Azul y Oro UNAM) */
        :root {
            --azul-unam: #002B5C;
            --oro-unam: #D4AF37;
            --fondo: #f4f7f6;
            --texto: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--fondo);
            color: var(--texto);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--azul-unam);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 5px solid var(--oro-unam);
        }

        .search-container {
            margin-top: 15px;
        }

        #searchBar {
            padding: 10px 15px;
            width: 80%;
            max-width: 400px;
            border: 2px solid var(--oro-unam);
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }

        .info-nota {
            background-color: #e9ecef;
            padding: 10px;
            text-align: center;
            font-size: 0.9em;
            color: #555;
        }

        /* Grid para las tarjetas de los libros */
        .grid-libros {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .tarjeta-libro {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }

        .tarjeta-libro:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .portada {
            width: 100%;
            height: 350px; 
            background-color: #ddd; 
            object-fit: cover; 
            object-position: top center; 
            border-bottom: 2px solid var(--oro-unam);
        }

        .contenido-tarjeta {
            padding: 15px;
            flex-grow: 1;
        }

        .encabezado-tarjeta {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 10px;
        }

        .titulo-libro {
            color: var(--azul-unam);
            margin: 0;
            font-size: 1.2em;
        }

        /* ACTUALIZADO: Diseño del botón de descarga con Flexbox para el ícono */
        .btn-descarga {
            background-color: var(--oro-unam);
            color: var(--azul-unam);
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 5px;
            font-size: 0.85em;
            font-weight: bold;
            white-space: nowrap;
            transition: background-color 0.2s, transform 0.2s;
            display: inline-flex; /* Alinea el ícono y el texto perfectamente */
            align-items: center;
            gap: 6px; /* Espacio entre el ícono y la palabra PDF */
        }

        .btn-descarga:hover {
            background-color: #e6c147; 
            transform: scale(1.05);
        }

        .autor {
            font-style: italic;
            color: #666;
            margin-bottom: 10px;
        }

        .etiqueta-temas {
            display: inline-block;
            background-color: var(--oro-unam);
            color: var(--azul-unam);
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 0.85em;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .ubicaciones {
            font-size: 0.9em;
        }

        .ubicaciones a {
            color: var(--azul-unam);
            text-decoration: none;
            font-weight: bold;
        }

        .ubicaciones a:hover {
            text-decoration: underline;
        }

        .tag-biblioteca {
            display: inline-block;
            border: 1px solid var(--azul-unam);
            padding: 2px 6px;
            border-radius: 4px;
            margin: 2px 0;
            font-size: 0.85em;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bibliografía: Estructuras Discretas</h1>
        <p>Fuente de consulta digital - Semestre 2026-2</p>
        <div class="search-container">
            <input type="text" id="searchBar" placeholder="Buscar por título, autor o tema...">
        </div>
    </header>

    <div class="info-nota">
        <strong>Nota de Ubicaciones:</strong> 
        Principal = Biblioteca "Mtro. Enrique Rivero Borrell" | 
        Anexo = Biblioteca "Ing. Antonio Dovalí Jaime".
    </div>

<main class="grid-libros" id="contenedorLibros">
    </main>

        const baseDeDatosLibros = [

                imagen: "img/Grass-MD.jpg",
                ubicaciones: ["Faq. Contaduria", "Faq. Ciencias", "Principal Ing.", "Anexo Ing."],
                extra: "",
                archivo: "https://drive.google.com/file/d/1rZ_lReowTmd_fprKMIWA63vLfOn0MjzK/view?usp=drive_link" 
            },
            {

                autor: "JOHNSONBAUGH, Richard",
                temas: "Todos",
                imagen: "img/John-MD.jpg",
                ubicaciones: ["Principal Ing.", "Anexo Ing.", "Faq. Economia", "Biblioteca Central", "Faq. Contaduria", "Faq. Quimica", "Faq. Ciencias"],

                imagen: "img/Liu-EMD.jpg",
                ubicaciones: ["Biblioteca Central", "Faq. Contaduria", "Posgrado Ing.", "Anexo Ing.", "Principal Ing.", "Int. Matematicas", "Faq. Ciencias"],
                extra: "",
                archivo: "https://drive.google.com/file/d/1lBEv9w70J3rz7XeCRoJchkUw5_gDcBJG/view?usp=drive_link"
            },
            {
                titulo: "Matemáticas discretas y sus aplicaciones",
                autor: "ROSEN, Kenneth H.",
                temas: "Todos",
                imagen: "img/Kenneth-MDyA.jpg",
                ubicaciones: ["Ctro. Ciencias Genómicas", "Faq. Economia", "CFATA", "Faq. Ciencias", "Posgrado Ing.", "Principal Ing.", "Anexo Ing.", "Ctro. Ciencias Mamemáticas"],
                extra: "",

            },

            {
                titulo: "Introductory Discrete Mathematics",
                autor: "BALAKRISHNAN, V. K.",
                temas: "1, 2, 3, 4",
                imagen: "img/Bala-IMD.jpg",
                ubicaciones: ["Principal Ing.", "Anexo Ing.", "Ctro. Ciencias Genómicas", "Faq. Ciencias", "Inst. Inv. Materiales", "Int. Matematicas", "Ctro. Ciencias Mamemáticas"],

            },
            {

                autor: "BOGART, Kenneth P.",
                temas: "1, 2, 3, 4",

                ubicaciones: ["Posgrado Ing.", "Anexo Ing."],
                extra: "",

            },
            {
                titulo: "Matemática discreta",
                autor: "COMELLAS, Francesc",
                temas: "1, 2, 3, 4",
                imagen: "img/Comellas-MD.jpg",
                ubicaciones: ["Biblioteca Central", "Anexo Ing."],
                extra: "",
                archivo: "https://drive.google.com/file/d/1TezdXqhnZ6Qv2dpRNnjRkfNfi2MA3oqh/view?usp=drive_link"
            },
            {
                titulo: "Discrete mathematics: elementary and beyond",
                autor: "LOVASZ, Laszlo",
                temas: "1, 2, 3, 4",
                imagen: "img/Lovas-MDEaB.png",
                ubicaciones: ["CFATA", "Int. Matematicas", "Anexo Ing."],
                extra: "",
                archivo: "https://drive.google.com/file/d/1UTRD-26jClznpbaFa2PFw05VSZ_2WRL6/view?usp=drive_link"
            },
            {
                titulo: "Matemáticas discretas", 
                autor: "SCHEINERMAN, Edward",
                temas: "1, 2, 3, 4",
                imagen: "img/Edward-MD.jpg",
                ubicaciones: ["Posgrado Ing.", "Anexo Ing."],
                extra: "",
                archivo: ""
            }
        ];

        // 3. LA LÓGICA QUE CONSTRUYE EL HTML AUTOMÁTICAMENTE
        const contenedor = document.getElementById('contenedorLibros');

        function renderizarLibros() {
            contenedor.innerHTML = ""; 
            
            baseDeDatosLibros.forEach(libro => {
                let htmlUbicaciones = libro.ubicaciones.map(ubi => {
                    let link = linksBibliotecas[ubi] || "#"; 
                    return `<span class="tag-biblioteca"><a href="${link}" target="_blank">[${ubi}]</a></span>`;
                }).join(" ");

                let htmlExtra = libro.extra !== "" ? `<br><small><i>Extra: ${libro.extra}</i></small>` : "";
                
                // ACTUALIZADO: Cambiamos el emoji por la etiqueta de FontAwesome 
let htmlBotonDescarga = libro.archivo ? `<a href="${libro.archivo}" target="_blank" rel="noopener noreferrer" class="btn-descarga" title="Ver y Descargar PDF"><i class="fa-solid fa-file-pdf"></i></a>` : "";

                let tarjetaHTML = `
                    <article class="tarjeta-libro">
                        <img src="${libro.imagen}" alt="Portada" class="portada">
                        <div class="contenido-tarjeta">
                            <div class="encabezado-tarjeta">
                                <h2 class="titulo-libro">${libro.titulo}</h2>
                                ${htmlBotonDescarga}
                            </div>
                            <p class="autor">${libro.autor}</p>
                            <div class="etiqueta-temas">Temas: ${libro.temas}</div>
                            
                            <div class="ubicaciones">
                                <p><strong>Ubicación Física:</strong></p>
                                ${htmlUbicaciones}
                                ${htmlExtra}
                            </div>
                        </div>
                    </article>
                `;
                
                contenedor.innerHTML += tarjetaHTML;
            });
        }

        renderizarLibros();

        // 4. LÓGICA DE LA BARRA DE BÚSQUEDA
        document.getElementById('searchBar').addEventListener('keyup', function(e) {
            const termino = e.target.value.toLowerCase();
            const tarjetas = document.getElementsByClassName('tarjeta-libro');

            Array.from(tarjetas).forEach(tarjeta => {
                const textoTarjeta = tarjeta.innerText.toLowerCase();
                tarjeta.style.display = textoTarjeta.includes(termino) ? 'flex' : 'none';
            });
        });
    </script>
</body>
</html>
