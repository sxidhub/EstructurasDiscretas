<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Estructuras Discretas</title>
    <style>
        /* CSS: Diseño y Colores (Azul y Oro UNAM) */
        :root {
            --azul-unam: #002B5C;
            --oro-unam: #D4AF37;
            --fondo: #f4f7f6;
            --texto: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--fondo);
            color: var(--texto);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--azul-unam);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 5px solid var(--oro-unam);
        }

        .search-container {
            margin-top: 15px;
        }

        #searchBar {
            padding: 10px 15px;
            width: 80%;
            max-width: 400px;
            border: 2px solid var(--oro-unam);
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }

        .info-nota {
            background-color: #e9ecef;
            padding: 10px;
            text-align: center;
            font-size: 0.9em;
            color: #555;
        }

        /* Grid para las tarjetas de los libros */
        .grid-libros {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .tarjeta-libro {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }

        .tarjeta-libro:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .portada {
            width: 100%;
            height: 200px;
            background-color: #ddd; 
            object-fit: contain;
            border-bottom: 2px solid var(--oro-unam);
        }

        .contenido-tarjeta {
            padding: 15px;
            flex-grow: 1;
        }

        .titulo-libro {
            color: var(--azul-unam);
            margin: 0 0 10px 0;
            font-size: 1.2em;
        }

        .autor {
            font-style: italic;
            color: #666;
            margin-bottom: 10px;
        }

        .etiqueta-temas {
            display: inline-block;
            background-color: var(--oro-unam);
            color: var(--azul-unam);
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 0.85em;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .ubicaciones {
            font-size: 0.9em;
        }

        .ubicaciones a {
            color: var(--azul-unam);
            text-decoration: none;
            font-weight: bold;
        }

        .ubicaciones a:hover {
            text-decoration: underline;
        }

        .tag-biblioteca {
            display: inline-block;
            border: 1px solid var(--azul-unam);
            padding: 2px 6px;
            border-radius: 4px;
            margin: 2px 0;
            font-size: 0.85em;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bibliografía: Estructuras Discretas</h1>
        <p>Fuente de consulta digital - Semestre 2026-2</p>
        <div class="search-container">
            <input type="text" id="searchBar" placeholder="Buscar por título, autor o tema...">
        </div>
    </header>

    <div class="info-nota">
        <strong>Nota de Ubicaciones:</strong> 
        Principal = Biblioteca "Mtro. Enrique Rivero Borrell" | 
        Anexo = Biblioteca "Ing. Antonio Dovalí Jaime".
    </div>

<main class="grid-libros" id="contenedorLibros">
    </main>

    <script>
        // 1. EL "DICCIONARIO" DE MAPAS
        const linksBibliotecas = {
            "Principal Ing.": "https://maps.app.goo.gl/uSMvpeLRXJHyXyTZA", 
            "Anexo Ing.": "https://maps.app.goo.gl/qgWfHg4nMHsAT3DW9",
            "Posgrado Ing.": "https://maps.app.goo.gl/vzRC4XNbwpgRKnHZA",
            "Biblioteca Central": "https://maps.app.goo.gl/gv5as81bEeLay2Ca6", 
            "Faq. Quimica": "https://maps.app.goo.gl/fjoeFiKAVqFYhR3Z9", 
            "Faq. Ciencias": "https://maps.app.goo.gl/xyAJwin7kYEfxXX19", 
            "Faq. Economia": "https://maps.app.goo.gl/1kLPE545MLwF76GLA",
            "Faq. Contaduria": "https://maps.app.goo.gl/jpKX47d2GWcv3pgd7",
            "Int. Matematicas": "https://maps.app.goo.gl/bcHCqTyLsTWjKxdt8",
            "Inst. Inv. Económicas": "https://maps.app.goo.gl/mLq4AHqxXythSBYV8",
            "Inst. Inv. Materiales": "https://maps.app.goo.gl/bh8mwUcqQtxHuMRC7",
            "Ctro. Ciencias Genómicas": "https://maps.app.goo.gl/DyMPVsNRLXYkQJHa7",
            "Ctro. Ciencias Mamemáticas": "https://maps.app.goo.gl/7VosHzhto9WrCbSK7",
            "CFATA": "https://maps.app.goo.gl/VxANSbT9wM7waoRJ8",
            "elibrounam": "https://elibrunam.dgb.unam.mx:8443/F?func=find-b-0&local_base=LIBBIDI"
        };

        // 2. BASE DE DATOS DE LIBROS EXTRAÍDA DE TUS APUNTES
        const baseDeDatosLibros = [
            {
                titulo: "Logic and discrete mathematics",
                autor: "Autor no especificado",
                temas: "Todos",
                imagen: "https://via.placeholder.com/300x200?text=Logic+Math",
                ubicaciones: ["Faq. Contaduria"],
                extra: ""
            },
            {
                titulo: "Logic and discrete mathematics: computer science perspective",
                autor: "Autor no especificado",
                temas: "Todos",
                imagen: "https://via.placeholder.com/300x200?text=Computer+Perspective",
                ubicaciones: ["Faq. Ciencias", "Principal Ing.", "Anexo Ing."],
                extra: ""
            },
            {
                titulo: "Discrete Mathematics",
                autor: "Autor no especificado",
                temas: "Todos",
                imagen: "https://via.placeholder.com/300x200?text=Discrete+Mathematics",
                ubicaciones: ["Principal Ing.", "Anexo Ing.", "Faq. Economia", "Biblioteca Central", "Faq. Contaduria", "Faq. Quimica", "Faq. Ciencias"],
                extra: ""
            },
            {
                titulo: "Algorithms: Sequential, Parallel and Distributed",
                autor: "BERMAN, Kenneth A.",
                temas: "4, 5",
                imagen: "https://via.placeholder.com/300x200?text=Algorithms",
                ubicaciones: ["Principal Ing."],
                extra: ""
            },
            {
                titulo: "Discrete Mathematical Structures",
                autor: "KOLMAN, Bernard",
                temas: "Todos",
                imagen: "https://via.placeholder.com/300x200?text=Discrete+Structures",
                ubicaciones: ["Biblioteca Central", "Principal Ing.", "Anexo Ing.", "Faq. Quimica"],
                extra: ""
            },
            {
                titulo: "Elements of discrete mathematics Español",
                autor: "Autor no especificado",
                temas: "Todos",
                imagen: "https://via.placeholder.com/300x200?text=Elements",
                ubicaciones: ["Biblioteca Central", "Faq. Contaduria", "Posgrado Ing.", "Anexo Ing.", "Principal Ing.", "Int. Matematicas", "Faq. Ciencias"],
                extra: ""
            },
            {
                titulo: "Discrete mathematics and its applications",
                autor: "ROSEN, Kenneth H.",
                temas: "Todos",
                imagen: "https://via.placeholder.com/300x200?text=Rosen",
                ubicaciones: ["Ctro. Ciencias Genómicas", "Faq. Economia", "CFATA", "Faq. Ciencias", "Posgrado Ing.", "Principal Ing.", "Anexo Ing.", "Ctro. Ciencias Mamemáticas"],
                extra: ""
            },
            {
                titulo: "Matemáticas discretas con aplicación a las ciencias de la computación",
                autor: "Autor no especificado",
                temas: "Todos",
                imagen: "https://via.placeholder.com/300x200?text=Aplicacion+Computacion",
                ubicaciones: ["Int. Matematicas", "Faq. Contaduria", "Faq. Ciencias", "Principal Ing.", "Anexo Ing.", "Inst. Inv. Económicas"],
                extra: ""
            },
            {
                titulo: "Discrete mathematics with graph theory and combinatorics",
                autor: "Autor no especificado",
                temas: "Todos",
                imagen: "https://via.placeholder.com/300x200?text=Graph+Theory",
                ubicaciones: ["Principal Ing.", "Anexo Ing.", "Biblioteca Central", "Faq. Ciencias"],
                extra: ""
            },
            {
                titulo: "Introductory discrete mathematics",
                autor: "Autor no especificado",
                temas: "Todos",
                imagen: "https://via.placeholder.com/300x200?text=Introductory",
                ubicaciones: ["Principal Ing.", "Anexo Ing.", "Ctro. Ciencias Genómicas", "Faq. Ciencias", "Inst. Inv. Materiales", "Int. Matematicas", "Ctro. Ciencias Mamemáticas"],
                extra: ""
            },
            {
                titulo: "Matematica discreta",
                autor: "Autor no especificado",
                temas: "Todos",
                imagen: "https://via.placeholder.com/300x200?text=Matematica+Discreta",
                ubicaciones: ["Biblioteca Central", "Anexo Ing."],
                extra: ""
            },
            {
                titulo: "Discrete mathematics: elementary and beyond",
                autor: "LOVASZ, Laszlo",
                temas: "1, 2, 3, 4",
                imagen: "https://via.placeholder.com/300x200?text=Lovasz",
                ubicaciones: ["elibrounam", "CFATA", "Int. Matematicas", "Anexo Ing."],
                extra: ""
            },
            {
                titulo: "Matematicas discretas",
                autor: "Autor no especificado",
                temas: "Todos",
                imagen: "https://via.placeholder.com/300x200?text=Matematicas+Discretas",
                ubicaciones: ["Posgrado Ing.", "Anexo Ing."],
                extra: ""
            }
        ];

        // 3. LA LÓGICA QUE CONSTRUYE EL HTML AUTOMÁTICAMENTE
        const contenedor = document.getElementById('contenedorLibros');

        function renderizarLibros() {
            contenedor.innerHTML = ""; 
            
            baseDeDatosLibros.forEach(libro => {
                let htmlUbicaciones = libro.ubicaciones.map(ubi => {
                    let link = linksBibliotecas[ubi] || "#"; 
                    return `<span class="tag-biblioteca"><a href="${link}" target="_blank">[${ubi}]</a></span>`;
                }).join(" ");

                let htmlExtra = libro.extra !== "" ? `<br><small><i>Extra: ${libro.extra}</i></small>` : "";

                let tarjetaHTML = `
                    <article class="tarjeta-libro">
                        <img src="${libro.imagen}" alt="Portada" class="portada">
                        <div class="contenido-tarjeta">
                            <h2 class="titulo-libro">${libro.titulo}</h2>
                            <p class="autor">${libro.autor}</p>
                            <div class="etiqueta-temas">Temas: ${libro.temas}</div>
                            
                            <div class="ubicaciones">
                                <p><strong>Ubicación Física:</strong></p>
                                ${htmlUbicaciones}
                                ${htmlExtra}
                            </div>
                        </div>
                    </article>
                `;
                
                contenedor.innerHTML += tarjetaHTML;
            });
        }

        renderizarLibros();

        // 4. LÓGICA DE LA BARRA DE BÚSQUEDA
        document.getElementById('searchBar').addEventListener('keyup', function(e) {
            const termino = e.target.value.toLowerCase();
            const tarjetas = document.getElementsByClassName('tarjeta-libro');

            Array.from(tarjetas).forEach(tarjeta => {
                const textoTarjeta = tarjeta.innerText.toLowerCase();
                tarjeta.style.display = textoTarjeta.includes(termino) ? 'flex' : 'none';
            });
        });
    </script>
</body>
</html>
